<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>LOTUSim</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;background:#f0f2f5;color:#1a1a2e;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
.header{background:#1a1a2e;color:white;padding:0 20px;height:48px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.header h1{font-size:14px;font-weight:600;letter-spacing:2px;color:#60a5fa}
.status-badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.status-badge.inactive{background:#374151;color:#9ca3af}
.status-badge.active{background:#065f36;color:#34d399}
.scen-nm{color:#6b7280;font-size:12px}

/* TAB BAR */
.tab-bar{background:white;border-bottom:2px solid #e5e7eb;padding:0 20px;display:flex;gap:4px;flex-shrink:0}
.tab-btn{padding:10px 20px;border:none;background:none;font-size:13px;font-weight:500;color:#6b7280;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s}
.tab-btn:hover{color:#374151}
.tab-btn.active{color:#2563eb;border-bottom-color:#2563eb}

/* TAB PANELS */
.tab-content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.tab-panel{display:none;flex:1;overflow:hidden}
.tab-panel.active{display:flex}

/* BUTTONS */
.btn{padding:7px 14px;border-radius:6px;border:1px solid transparent;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;white-space:nowrap}
.btn-primary{background:#2563eb;color:white;border-color:#2563eb}.btn-primary:hover{background:#1d4ed8}
.btn-success{background:#059669;color:white;border-color:#059669}.btn-success:hover{background:#047857}
.btn-danger{background:#dc2626;color:white;border-color:#dc2626}.btn-danger:hover{background:#b91c1c}
.btn-secondary{background:white;color:#374151;border-color:#d1d5db}.btn-secondary:hover{background:#f9fafb}
.btn-amber{background:#d97706;color:white;border-color:#d97706}.btn-amber:hover{background:#b45309}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-xs{padding:2px 7px;font-size:11px;border-radius:4px}

/* FORM ELEMENTS */
input[type=text],input[type=number],select,textarea{font-family:inherit;font-size:12px;border:1px solid #d1d5db;border-radius:5px;padding:5px 8px;background:white;outline:none;color:#1a1a2e}
input[type=text]:focus,input[type=number]:focus,select:focus,textarea:focus{border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.1)}

/* TOAST */
.toast{padding:7px 12px;border-radius:6px;font-size:12px;display:none}
.toast.ok{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
.toast.err{background:#fee2e2;color:#b91c1c;border:1px solid #fecaca}

/* ══ HTN TAB ══════════════════════════════════════════════════════ */
.htn-wrap{display:flex;width:100%;height:100%}
.htn-side{width:250px;background:white;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;flex-shrink:0}
.htn-subtabs{display:flex;border-bottom:1px solid #e5e7eb}
.htn-stab{flex:1;padding:8px 4px;text-align:center;font-size:11px;font-weight:600;border:none;background:none;cursor:pointer;color:#6b7280;border-bottom:2px solid transparent}
.htn-stab.active{color:#2563eb;border-bottom-color:#2563eb;background:#eff6ff}
.htn-list{overflow-y:auto;flex:1;padding:6px}
.htn-item{padding:9px 10px;border-radius:6px;cursor:pointer;border:1px solid transparent;margin-bottom:3px;display:flex;align-items:center;gap:8px}
.htn-item:hover{background:#f9fafb;border-color:#e5e7eb}
.htn-item.sel{background:#eff6ff;border-color:#bfdbfe}
.htn-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.ic-a{background:#dcfce7}.ic-m{background:#fef3c7}.ic-t{background:#ede9fe}
.htn-iname{font-weight:600;font-size:12px}
.htn-iparams{color:#9ca3af;font-size:10px;margin-top:1px}
.htn-main{flex:1;overflow-y:auto;padding:24px;background:#f9fafb}
.htn-empty{display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;text-align:center}
.htn-card{background:white;border-radius:10px;border:1px solid #e5e7eb;padding:20px;max-width:560px}
.htn-card h3{font-size:14px;color:#111827;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.chips{display:flex;flex-wrap:wrap;gap:5px;min-height:28px}
.chip{background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;padding:3px 9px;border-radius:20px;font-size:12px}
.code-pre{background:#1e1e2e;color:#cdd6f4;padding:10px;border-radius:6px;font-family:'Consolas','Courier New',monospace;font-size:11px;overflow:auto;max-height:200px;white-space:pre;border:1px solid #3f3f5f}

/* ══ SCENARIO TAB ═════════════════════════════════════════════════ */
.scen-wrap{width:100%;height:100%;display:flex;flex-direction:column}
.scen-topbar{background:white;border-bottom:1px solid #e5e7eb;padding:8px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.workflow{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.wf-section{background:white;border-radius:10px;border:1px solid #e5e7eb;overflow:hidden}
.wf-hdr{padding:10px 16px;background:#f8fafc;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:8px}
.wf-hdr h3{font-size:13px;font-weight:600;color:#374151;flex:1}
.agent-row{padding:12px 16px;border-bottom:1px solid #f3f4f6;display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap}
.agent-row:last-child{border-bottom:none}
.agent-box{min-width:170px;flex-shrink:0;border-radius:8px;padding:10px 12px;border:2px solid}
.agent-box label{font-size:10px;font-weight:600;color:#6b7280;display:block;margin-top:5px;margin-bottom:2px}
.agent-box input,.agent-box select{width:100%;padding:3px 6px;font-size:12px;border-radius:4px}
.agent-title{font-weight:700;font-size:12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.chain{display:flex;align-items:flex-start;flex:1;flex-wrap:wrap;gap:0;padding-top:32px}
.chain-arr{color:#d1d5db;font-size:22px;padding:0 4px;flex-shrink:0;margin-top:8px}
.task-blk{background:#f0fdf4;border:2px solid #86efac;border-radius:8px;padding:8px 10px;min-width:150px;flex-shrink:0}
.task-blk-top{display:flex;align-items:center;gap:4px;margin-bottom:6px}
.task-blk-top select{flex:1;font-size:12px;padding:3px 5px;border-radius:4px}
.task-blk-rm{background:none;border:none;cursor:pointer;color:#9ca3af;font-size:16px;line-height:1;padding:0;flex-shrink:0}
.task-blk-rm:hover{color:#dc2626}
.task-blk label{font-size:10px;color:#166534;font-weight:600;display:block;margin-bottom:2px}
.task-blk input,.task-blk select.task-arg{width:100%;font-size:11px;padding:3px 5px;border-radius:4px;margin-top:2px}
.add-task{background:white;border:2px dashed #d1d5db;border-radius:8px;padding:8px 12px;color:#9ca3af;cursor:pointer;font-size:12px;white-space:nowrap;flex-shrink:0;margin-top:8px}
.add-task:hover{border-color:#86efac;color:#059669;background:#f0fdf4}
.no-agents{padding:20px;text-align:center;color:#9ca3af}
.zones-row{display:flex;flex-wrap:wrap;gap:10px;padding:12px 16px}
.zone-card{background:#fff7ed;border:2px solid #fdba74;border-radius:8px;padding:10px 12px;min-width:200px}
.zone-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.zone-card-title{font-weight:700;color:#c2410c;font-size:12px}
.zone-card textarea{width:100%;font-size:11px;border-color:#fdba74;border-radius:4px;font-family:'Consolas',monospace;resize:vertical}
.evts-list{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.evt-card{background:#fffbeb;border:2px solid #fde68a;border-radius:8px;padding:10px 12px}
.evt-card-top{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.evt-name-in{font-weight:700;font-size:12px;border:none;background:transparent;outline:none;color:#92400e;flex:1;padding:0}
.evt-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.evt-grid label{font-size:10px;font-weight:700;color:#78350f;display:block;margin-bottom:2px}
.evt-grid input,.evt-grid select{width:100%;padding:3px 5px;border-color:#fde68a;font-size:11px}

/* ══ MAP TAB ══════════════════════════════════════════════════════ */
.map-wrap{width:100%;height:100%;display:flex}
.map-side{width:270px;background:white;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.map-sec{padding:10px 14px;border-bottom:1px solid #f3f4f6}
.map-sec h4{font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center}
.ctrl-row{display:flex;gap:6px;flex-wrap:wrap}
.ag-leg{display:flex;align-items:center;gap:7px;padding:3px 0;font-size:12px}
.ag-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.log-box{font-size:11px;max-height:180px;overflow-y:auto;font-family:'Consolas',monospace}
.ll{padding:1px 0;border-bottom:1px solid #f3f4f6}
.ll.evt{color:#d97706}.ll.act{color:#059669}.ll.inf{color:#6b7280}
.dist-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px}
.dist-pill{padding:2px 7px;border-radius:10px;font-size:11px;font-weight:600}
.dp-r{background:#fee2e2;color:#b91c1c}.dp-y{background:#fef3c7;color:#92400e}.dp-g{background:#dcfce7;color:#166534}
.plan-item{padding:2px 8px;margin:1px 0;background:#f9fafb;border-left:2px solid #d1d5db;font-size:11px;font-family:monospace}
.map-area{flex:1;display:flex;align-items:center;justify-content:center;background:#f9fafb;padding:12px;overflow:hidden}
#map-canvas{border:2px solid #e5e7eb;border-radius:8px;background:white;display:block}
</style>
</head>
<body>

<header class="header">
  <h1>&#9875; LOTUSIM</h1>
  <span id="hdr-badge" class="status-badge inactive">INACTIF</span>
  <span id="hdr-scen" class="scen-nm"></span>
  <span style="flex:1"></span>
  <span id="hdr-t" style="color:#4b5563;font-size:12px">t = 0s</span>
</header>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('htn',this)">&#9672; Domaine HTN</button>
  <button class="tab-btn" onclick="switchTab('scenario',this)">&#11041; Scenario</button>
  <button class="tab-btn" onclick="switchTab('map',this)">&#9677; Carte &amp; Execution</button>
</div>

<div class="tab-content">

  <!-- HTN TAB -->
  <div id="tp-htn" class="tab-panel active">
    <div class="htn-wrap">
      <div class="htn-side">
        <div class="htn-subtabs">
          <button class="htn-stab active" onclick="htnSub('actions',this)">Actions</button>
          <button class="htn-stab" onclick="htnSub('methods',this)">Methodes</button>
          <button class="htn-stab" onclick="htnSub('tasks',this)">Taches</button>
        </div>
        <div class="htn-list" id="htn-list"></div>
      </div>
      <div class="htn-main" id="htn-main">
        <div class="htn-empty">
          <div><div style="font-size:36px;margin-bottom:10px">&#9672;</div>Selectionnez un element</div>
        </div>
      </div>
    </div>
  </div>

  <!-- SCENARIO TAB -->
  <div id="tp-scenario" class="tab-panel">
    <div class="scen-wrap">
      <div class="scen-topbar">
        <span style="font-weight:600;color:#374151;flex-shrink:0">Scenario :</span>
        <input type="text" id="snom" placeholder="Nom du scenario" style="width:200px">
        <button class="btn btn-primary btn-sm" onclick="addAgent()">+ Agent</button>
        <button class="btn btn-secondary btn-sm" onclick="addZone()">+ Zone</button>
        <button class="btn btn-amber btn-sm" onclick="addEvt()">+ Evenement</button>
        <span style="flex:1"></span>
        <span id="smsg" class="toast"></span>
        <button class="btn btn-success btn-sm" onclick="saveScenario()">Sauvegarder</button>
      </div>
      <div class="workflow">
        <div class="wf-section">
          <div class="wf-hdr">
            <span style="font-size:16px">&#128674;</span>
            <h3>Agents &amp; Taches</h3>
            <span style="font-size:11px;color:#6b7280">Blocs dans l'ordre d'execution</span>
          </div>
          <div id="ag-rows"></div>
        </div>
        <div class="wf-section">
          <div class="wf-hdr">
            <span style="font-size:16px">&#128205;</span>
            <h3>Zones de patrouille</h3>
            <button class="btn btn-secondary btn-xs" onclick="addZone()">+ Zone</button>
          </div>
          <div class="zones-row" id="zones-row"></div>
        </div>
        <div class="wf-section">
          <div class="wf-hdr">
            <span style="font-size:16px">&#9889;</span>
            <h3>Evenements &amp; Declencheurs</h3>
            <button class="btn btn-secondary btn-xs" onclick="addEvt()">+ Evenement</button>
          </div>
          <div class="evts-list" id="evts-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- MAP TAB -->
  <div id="tp-map" class="tab-panel">
    <div class="map-wrap">
      <div class="map-side">
        <div class="map-sec">
          <h4>Controles</h4>
          <div class="ctrl-row">
            <button class="btn btn-amber btn-sm" onclick="doPreview()">Generer plan</button>
            <button class="btn btn-success btn-sm" id="btn-go" onclick="lancer()">Lancer</button>
            <button class="btn btn-danger btn-sm" id="btn-stop" style="display:none" onclick="arreter()">Arreter</button>
          </div>
        </div>
        <div class="map-sec">
          <h4>Plan genere</h4>
          <div id="plan-div" style="color:#9ca3af;font-size:11px">Cliquer sur "Generer plan"</div>
        </div>
        <div class="map-sec">
          <h4>Agents</h4>
          <div id="ag-legend"></div>
        </div>
        <div class="map-sec">
          <h4>Distances</h4>
          <div id="dists">-</div>
        </div>
        <div class="map-sec">
          <h4>Evenements</h4>
          <div id="evts-log" style="font-size:11px;max-height:80px;overflow-y:auto"></div>
        </div>
        <div class="map-sec" style="flex:1">
          <h4>Journal <button class="btn btn-secondary btn-xs" onclick="document.getElementById('elog').innerHTML=''">Vider</button></h4>
          <div class="log-box" id="elog"></div>
        </div>
      </div>
      <div class="map-area" id="map-area">
        <canvas id="map-canvas"></canvas>
      </div>
    </div>
  </div>

</div>

<script src="/static/app.js"></script>
</body>
</html>
